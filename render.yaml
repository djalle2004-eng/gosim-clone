services:
  # 1. Backend Web Service (Node.js)
  - type: web
    name: gosim-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:shared && npm run build:backend
    startCommand: npx prisma migrate deploy --schema=backend/prisma/schema.prisma && npm run start --workspace=backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gosim-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: gosim-redis
          property: connectionString
      - key: FRONTEND_URL
        value: 'https://gosim-web.onrender.com' # Update this manually in Render Dashboard once deployment is done
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: AIRALO_AUTH_URL
        value: 'https://sandbox-auth.airalo.com/api/v1/token'
      - key: AIRALO_BASE_URL
        value: 'https://sandbox-api.airalo.com/api/v2'
      # These should be updated manually in the Render Dashboard:
      - key: AIRALO_CLIENT_ID
        value: 'YOUR_AIRALO_CLIENT_ID'
      - key: AIRALO_CLIENT_SECRET
        value: 'YOUR_AIRALO_CLIENT_SECRET'

  # 2. Frontend Static Site
  - type: web
    name: gosim-web
    runtime: static
    buildCommand: npm install && npm run build:shared && npm run build:frontend
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://gosim-api.onrender.com" # Update this manually in Render Dashboard once deployment is done

  # 3. Redis Cache (Key-Value)
  - type: keyvalue
    name: gosim-redis
    plan: free
    ipAllowList: [] # Only allow internal Render services

# 4. Database (PostgreSQL)
databases:
  - name: gosim-db
    plan: free
